name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js # Fixed typo from 'NoACde.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Railway
        uses: railwayapp/railway-deploy-action@v2
        with:
          railwayToken: ${{ secrets.RAILWAY_TOKEN }}name: Deploy to Railway

