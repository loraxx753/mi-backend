"""
The specific raw data blocks available from the model.
"""
enum ModelComponent {
  TOKENS
  ATTENTION_MAP
  RESIDUAL_STREAM
}

"""
Heavy-duty math tasks offloaded to the Python/GPU bridge.
This transforms raw tensors into "D3-ready" geometry.
"""
enum ComputeTask {
  PCA_3D
  COSINE_SIMILARITY
}

"""
Controls where inspect snapshots come from.
"""
enum SnapshotSource {
  MOCK
  FIXTURE
  LIVE
}

"""
The results of a 'Digital Autopsy' inspection.
"""
type ModelSnapshot {
  prompt: String
  tokens: [String!]
  # [Head Index][Query][Key]
  attention: [[[Float!]!]!]
  visualizations: Visualizations
  # [Token Index][768 Features]
  residual: [[Float!]!]
  status: String
  device: String
}

"""
Persisted inspect snapshot for long-term prompt analysis history.
"""
type StoredAnalysis {
  id: ID!
  prompt: String!
  layer: Int!
  components: [ModelComponent!]!
  source: SnapshotSource!
  tokens: [String!]!
  attention: [[[Float!]!]!]
  visualizations: Visualizations
  status: String
  device: String
  createdAt: String!
  updatedAt: String!
}

"""
Flattened heatmap cell for attention visualization.
"""
type HeatmapCell {
  head: Int!
  query: String!
  key: String!
  value: Float!
}

"""
Derived, frontend-ready visualizations built from raw model tensors.
"""
type Visualizations {
  heatmap: [HeatmapCell!]
}

"""
Geometry-ready data for frontend visualization.
Used to map high-dimensional thoughts to 2D/3D space.
"""
type GeometrySnapshot {
  # For PCA_3D: A list of coordinates [x, y, z] for each token
  points: [[Float!]!]
  
  # For COSINE_SIMILARITY: A square matrix showing token-to-token connections
  matrix: [[Float!]!]
  
  # Metadata for debugging
  status: String
}

"""
The Ignition status of the remote GPU brain.
"""
type EngineStatus {
  isLive: Boolean!
  modelLoaded: String
  gpuType: String
}

type Query {
  """
  The "Ignition" sanity check.
  """
  engineStatus: EngineStatus!

  """
  Direct inspection of the model's internal state.
  """
  inspect(
    prompt: String!, 
    layer: Int!, 
    components: [ModelComponent!]!,
    source: SnapshotSource,
    persist: Boolean,
    customEndpoint: String
  ): ModelSnapshot!

  """
  Fetch recent persisted prompt analyses.
  """
  analysisHistory(
    prompt: String,
    limit: Int = 20
  ): [StoredAnalysis!]!

  """
  The Compute Bridge: Fetches tensors and performs geometric math in one pass.
  """
  compute(
    prompt: String!,
    layer: Int!,
    task: ComputeTask!,
    customEndpoint: String
  ): GeometrySnapshot!
}